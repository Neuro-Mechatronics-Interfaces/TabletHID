name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run when a newer
# push arrives so the live site always reflects the latest commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
        env:
          # Sets vite's `base` to '/TabletHID/' so asset URLs and React Router's
          # basename resolve correctly on the default github.io sub-path.
          # If you later point a custom domain at Pages, remove this env var and
          # update the 'base' check in web/public/404.html to match.
          PAGES_BASE: /TabletHID/

      # Tutorial videos are large binaries; the fallback site doesn't need them.
      # Remove before uploading to keep the Pages artifact small.
      - name: Strip tutorial videos
        run: rm -rf web/dist/vid

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
