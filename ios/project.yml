name: TabletHID
options:
  bundleIdPrefix: com.tablet
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.6.2"
    CURRENT_PROJECT_VERSION: "38"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "4Y8T66B2HQ"
targets:
  TabletHID:
    type: application
    platform: iOS
    sources:
      - TabletHID
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tablet.hid.ios
        PRODUCT_NAME: TabletHID
        INFOPLIST_FILE: TabletHID/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - TabletHIDTests
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
  TabletHIDTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TabletHIDTests
    dependencies:
      - target: TabletHID
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tablet.hid.ios.tests
        INFOPLIST_FILE: TabletHIDTests/Info.plist
